<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="x-apple-disable-message-reformatting" />
    <title>Thông báo Flash Sale</title>
    <style>
      @media screen and (max-width: 640px) {
        .email-shell {
          padding: 24px 16px !important;
        }

        .email-container {
          width: 100% !important;
        }

        .email-content {
          padding: 32px 24px !important;
        }
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0; background-color: #fff7f5">
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      border="0"
      bgcolor="#FFF7F5"
      style="width: 100%; margin: 0; padding: 0; background-color: #fff7f5"
    >
      <tr>
        <td class="email-shell" align="center" style="padding: 40px 24px">
          <table
            role="presentation"
            width="600"
            cellpadding="0"
            cellspacing="0"
            border="0"
            align="center"
            bgcolor="#FFFFFF"
            class="email-container"
            style="
              width: 600px;
              max-width: 600px;
              margin: 0 auto;
              background-color: #ffffff;
              border: 1px solid #f3d4d8;
              border-radius: 16px;
              border-collapse: separate;
              overflow: hidden;
              box-shadow: 0 14px 36px rgba(122, 38, 56, 0.1);
            "
          >
            <tr>
              <td align="center" style="padding: 36px 40px 12px 40px">
                <div
                  style="
                    font-family: 'Segoe UI', Arial, sans-serif;
                    font-size: 14px;
                    line-height: 20px;
                    font-weight: 700;
                    color: #e93e68;
                    text-align: center;
                  "
                >
                  Luxora Perfume &amp; Cosmetics
                </div>
                <table
                  role="presentation"
                  width="52"
                  cellpadding="0"
                  cellspacing="0"
                  border="0"
                  align="center"
                  style="margin: 16px auto 0 auto"
                >
                  <tr>
                    <td
                      height="3"
                      bgcolor="#D6A85A"
                      style="
                        height: 3px;
                        line-height: 3px;
                        font-size: 0;
                        background-color: #d6a85a;
                        border-radius: 999px;
                      "
                    >
                      &nbsp;
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td
                class="email-content"
                align="center"
                style="padding: 20px 48px 40px 48px"
              >
                <h1
                  style="
                    margin: 0;
                    font-family: Georgia, 'Times New Roman', serif;
                    font-size: 32px;
                    line-height: 38px;
                    font-weight: 700;
                    color: #2b2b2b;
                    text-align: center;
                  "
                >
                  Thông báo Flash Sale
                </h1>
                <table
                  role="presentation"
                  width="100%"
                  cellpadding="0"
                  cellspacing="0"
                  border="0"
                  style="width: 100%; margin: 24px 0 0 0"
                >
                  <tr>
                    <td
                      align="center"
                      style="
                        padding: 18px 20px;
                        background-color: #fff7f5;
                        border: 1px solid #f3d4d8;
                        border-radius: 12px;
                      "
                    >
                      <p
                        style="
                          margin: 0;
                          font-family: Georgia, 'Times New Roman', serif;
                          font-size: 22px;
                          line-height: 28px;
                          font-weight: 700;
                          color: #7a2638;
                          text-align: center;
                        "
                      >
                        "{{flashSaleName}}"
                      </p>
                    </td>
                  </tr>
                </table>
                <p
                  style="
                    margin: 22px 0 0 0;
                    font-family: 'Segoe UI', Arial, sans-serif;
                    font-size: 16px;
                    line-height: 26px;
                    color: #2b2b2b;
                    text-align: center;
                  "
                >
                  Flash Sale sẽ bắt đầu sau 15 phút. Đây là cơ hội để bạn mua
                  sắm các sản phẩm yêu thích với giá ưu đãi.
                </p>
                <p
                  style="
                    margin: 10px 0 0 0;
                    font-family: 'Segoe UI', Arial, sans-serif;
                    font-size: 14px;
                    line-height: 22px;
                    color: #666666;
                    text-align: center;
                  "
                >
                  Hãy chuẩn bị sẵn sàng và đừng bỏ lỡ chương trình.
                </p>
              </td>
            </tr>
            <tr>
              <td
                align="center"
                style="
                  padding: 22px 40px 30px 40px;
                  border-top: 1px solid #f3d4d8;
                "
              >
                <p
                  style="
                    margin: 0;
                    font-family: 'Segoe UI', Arial, sans-serif;
                    font-size: 12px;
                    line-height: 18px;
                    color: #8a7a7d;
                    text-align: center;
                  "
                >
                  © 2026 Luxora Perfume &amp; Cosmetics. All rights reserved.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
